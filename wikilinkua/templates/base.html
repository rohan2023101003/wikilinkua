<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WikiLinkua{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>

  <nav class="navbar navbar-expand navbar-dark wl-navbar sticky-top">
    <a class="navbar-brand" href="{{ url_for('main.index') }}">WikiLinkua</a>
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('main.wikilinkua') }}">Bridge Words</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="{{ url_for('main.false_friends') }}">Friend or Faux</a>
      </li>
    </ul>
  </nav>

  {% block page_content %}{% endblock %}

  <footer class="container text-muted small my-5">
    <hr>
    Data from <a href="https://www.wikidata.org">Wikidata</a> &amp;
    <a href="https://commons.wikimedia.org">Wikimedia Commons</a>.
    WikiLinkua &mdash; Wikimedia Hackathon 2026
    (<a href="https://phabricator.wikimedia.org/T425045">T425045</a>).
    Code licensed Apache-2.0.
  </footer>

  <!-- defines SPARQL_ENDPOINT_URL before the per-page scripts run -->
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  {% block scripts %}{% endblock %}

</body>
</html>
